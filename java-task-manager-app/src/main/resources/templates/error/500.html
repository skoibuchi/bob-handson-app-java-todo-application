<!DOCTYPE html>

      th:replace="~{layout/default :: layout(~{::title}, ~{::content})}">
<head>
    <title>500 Internal Server Error</title>
</head>
<body>
    <div th:fragment="content">
        <div class="text-center mt-5">

            <h2 class="mb-4">サーバーエラー</h2>
            <p class="lead">予期しないエラーが発生しました。</p>
            <a th:href="@{/tasks}" class="btn btn-primary mt-3">
                <i class="bi bi-house"></i> ホームに戻る

        </div>
    </div>
</body>
</html>
