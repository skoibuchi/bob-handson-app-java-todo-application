<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/default :: layout(~{::title}, ~{::content})}">
<head>
    <title>タスク一覧</title>
</head>
<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>タスク一覧</h1>
            <a th:href="@{/tasks/new}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> 新規作成
            </a>
        </div>
        
        <!-- カンバンボード -->
        <div class="row g-3">
            <!-- 各ステータス列 -->
            <div th:each="status : ${statuses}" class="col-md-3">
                <div class="card bg-light h-100">
                    <div class="card-header"
                         th:classappend="${status.name() == 'TODO' ? 'bg-secondary text-white' :
                                         status.name() == 'IN_PROGRESS' ? 'bg-primary text-white' :
                                         status.name() == 'ON_HOLD' ? 'bg-warning' : 'bg-success text-white'}">
                        <h5 class="mb-0">
                            <i class="bi"
                               th:classappend="${status.name() == 'TODO' ? 'bi-list-task' :
                                               status.name() == 'IN_PROGRESS' ? 'bi-arrow-repeat' :
                                               status.name() == 'ON_HOLD' ? 'bi-pause-circle' : 'bi-check-circle'}"></i>
                            <span th:text="${status.displayName}">ステータス</span>
                            <span class="badge bg-white text-dark ms-2"
                                  th:text="${tasksByStatus.get(status) != null ? tasksByStatus.get(status).size() : 0}">0</span>
                        </h5>
                    </div>
                    <div class="card-body p-2" style="min-height: 400px; max-height: 600px; overflow-y: auto;">
                        <!-- タスクがない場合 -->
                        <div th:if="${tasksByStatus.get(status) == null || tasksByStatus.get(status).isEmpty()}"
                             class="text-center text-muted p-3">
                            <i class="bi bi-inbox" style="font-size: 2rem;"></i>
                            <p class="mt-2 mb-0">タスクなし</p>
                        </div>
                        
                        <!-- タスクカード -->
                        <div th:each="task : ${tasksByStatus.get(status)}" class="card mb-2 shadow-sm">
                            <div class="card-body p-3">
                                <h6 class="card-title mb-2" th:text="${task.title}">タスクタイトル</h6>
                                <p class="card-text small text-muted mb-2"
                                   th:text="${#strings.length(task.description) > 60 ? #strings.substring(task.description, 0, 60) + '...' : task.description}">
                                    タスク説明
                                </p>
                                
                                <!-- 優先度バッジ -->
                                <div class="mb-2">
                                    <span class="badge"
                                          th:classappend="${task.priority.name() == 'HIGH' ? 'bg-danger' :
                                                          task.priority.name() == 'MEDIUM' ? 'bg-warning text-dark' : 'bg-info'}"
                                          th:text="${task.priority.displayName}">優先度</span>
                                </div>
                                
                                <!-- 期限 -->
                                <p class="card-text mb-2" th:if="${task.dueDate != null}">
                                    <small class="text-muted">
                                        <i class="bi bi-calendar"></i>
                                        <span th:text="${#temporals.format(task.dueDate, 'MM/dd')}">03/01</span>
                                    </small>
                                </p>
                                
                                <!-- アクションボタン -->
                                <div class="d-flex gap-1">
                                    <a th:href="@{/tasks/{id}(id=${task.id})}"
                                       class="btn btn-sm btn-outline-primary flex-fill">
                                        <i class="bi bi-eye"></i> 詳細
                                    </a>
                                    <a th:href="@{/tasks/{id}/edit(id=${task.id})}"
                                       class="btn btn-sm btn-outline-secondary">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
